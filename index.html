<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brihta — Učni portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:     #3d7a52;
      --green-lt:  #4e9966;
      --green-dk:  #1a3a2a;
      --green-bg:  #f0f7f3;
      --amber:     #f5a623;
      --amber-dk:  #e8902a;
      --white:     #ffffff;
      --gray-1:    #f5f5f7;
      --gray-2:    #e8e8ed;
      --gray-3:    #aeaeb2;
      --gray-4:    #636366;
      --text:      #1d1d1f;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.10);
      --shadow-lg: 0 20px 48px rgba(0,0,0,0.14);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --max-w: 720px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      background: var(--white);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HERO HEADER ─── */
    .hero {
      background: linear-gradient(160deg, #1a3a2a 0%, #2d5a3d 45%, #3d7a52 100%);
      padding: 0 24px 0;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 70% 50%, rgba(245,166,35,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 50% 80% at 10% 100%, rgba(61,122,82,0.3) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Subtle dot grid */
    .hero::after {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    .hero-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 1;
    }

    .hero-logo-wrap {
      flex-shrink: 0;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      position: relative;
    }

    .hero-logo-wrap img {
      width: 200px;
      height: 200px;
      object-fit: contain;
      object-position: bottom center;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.3));
      animation: heroOwlIn 0.7s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes heroOwlIn {
      from { opacity: 0; transform: translateY(20px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .hero-text {
      flex: 1;
      padding: 36px 0 36px 28px;
      animation: heroTextIn 0.6s ease both 0.15s;
    }

    @keyframes heroTextIn {
      from { opacity: 0; transform: translateX(16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(245,166,35,0.18);
      border: 1px solid rgba(245,166,35,0.35);
      border-radius: 100px;
      padding: 4px 12px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 12px;
    }

    .hero-badge-dot {
      width: 6px; height: 6px;
      background: var(--amber);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.7); }
    }

    .hero-title {
      font-size: clamp(2.6rem, 6vw, 3.8rem);
      font-weight: 900;
      color: #fff;
      line-height: 1;
      letter-spacing: -1.5px;
    }

    .hero-title span {
      background: linear-gradient(90deg, #f5a623, #ffd080);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      margin-top: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.2px;
    }

    /* ─── MAIN ─── */
    main {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* ─── SECTION HEADERS ─── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--gray-3);
    }

    /* ─── APP GRID ─── */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 44px;
    }

    @media (max-width: 480px) {
      .app-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
    }

    /* ─── APP ICON ─── */
    .app-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      position: relative;
      animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
    }

    .app-icon:nth-child(1) { animation-delay: 0.05s; }
    .app-icon:nth-child(2) { animation-delay: 0.10s; }
    .app-icon:nth-child(3) { animation-delay: 0.15s; }
    .app-icon:nth-child(4) { animation-delay: 0.20s; }
    .app-icon:nth-child(5) { animation-delay: 0.25s; }
    .app-icon:nth-child(6) { animation-delay: 0.30s; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.75) translateY(12px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .app-icon-box {
      width: 76px;
      height: 76px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.1rem;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 4px 0 rgba(0,0,0,0.12),
        0 6px 18px rgba(0,0,0,0.12);
      transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s ease;
    }

    /* Gloss shine */
    .app-icon-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 45%;
      background: linear-gradient(180deg, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0) 100%);
      border-radius: 22px 22px 0 0;
      pointer-events: none;
    }

    .app-icon:hover .app-icon-box {
      transform: translateY(-5px) scale(1.06);
      box-shadow: 0 8px 0 rgba(0,0,0,0.10), 0 14px 32px rgba(0,0,0,0.16);
    }

    .app-icon:active .app-icon-box {
      transform: scale(0.92) translateY(0);
      box-shadow: 0 1px 0 rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.10);
    }

    .app-icon-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      line-height: 1.25;
      max-width: 80px;
    }

    /* ─── DELETE MODE ─── */
    .delete-badge {
      position: absolute;
      top: -7px; left: -7px;
      width: 24px; height: 24px;
      background: #ff3b30;
      border-radius: 50%;
      color: white;
      font-size: 16px;
      font-weight: 700;
      border: 2px solid white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 5;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      line-height: 1;
    }

    .delete-mode .delete-badge { opacity: 1; pointer-events: auto; }
    .delete-mode .app-icon-box { animation: jiggle 0.35s ease-in-out infinite; }

    @keyframes jiggle {
      0%, 100% { transform: rotate(-2.5deg); }
      50%       { transform: rotate(2.5deg); }
    }

    /* ─── TOOLBAR ─── */
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 22px;
      border-radius: 100px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      border: none;
      cursor: pointer;
      transition: transform 0.15s cubic-bezier(.34,1.56,.64,1), box-shadow 0.15s ease, opacity 0.15s;
      letter-spacing: 0.1px;
    }

    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: scale(0.95); }

    .btn-primary {
      background: var(--green);
      color: #fff;
      box-shadow: 0 4px 14px rgba(61,122,82,0.35);
    }
    .btn-primary:hover { box-shadow: 0 8px 24px rgba(61,122,82,0.4); }

    .btn-ghost {
      background: var(--gray-1);
      color: var(--gray-4);
      box-shadow: var(--shadow-sm);
    }
    .btn-ghost:hover { background: var(--gray-2); }

    .note {
      font-size: 0.73rem;
      color: var(--gray-3);
      margin-top: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ─── DIVIDER ─── */
    .divider {
      height: 1px;
      background: var(--gray-2);
      margin: 36px 0;
    }

    /* ─── MODAL ─── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-box {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: var(--radius-xl);
      padding: 32px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.06);
      animation: slideUp 0.3s cubic-bezier(.34,1.4,.64,1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-box h2 {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }

    .modal-field { margin-bottom: 14px; }

    .modal-field label {
      display: block;
      font-weight: 700;
      font-size: 0.72rem;
      color: var(--gray-3);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .modal-field input {
      width: 100%;
      padding: 13px 16px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--gray-2);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      background: var(--gray-1);
      outline: none;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }

    .modal-field input:focus {
      border-color: var(--green);
      background: white;
      box-shadow: 0 0 0 4px rgba(61,122,82,0.1);
    }

    .modal-btns {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .modal-desc {
      font-size: 0.9rem;
      color: var(--gray-4);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* ─── TOAST ─── */
    #toast-container {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      pointer-events: none;
    }

    .toast {
      background: var(--green-dk);
      color: white;
      padding: 13px 22px;
      border-radius: 100px;
      font-weight: 700;
      font-size: 0.88rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      animation: toastIn 0.35s cubic-bezier(.34,1.56,.64,1) both,
                 toastOut 0.3s ease 2.5s both;
      white-space: nowrap;
    }

    @keyframes toastIn  { from { opacity:0; transform: translateY(16px) scale(0.9); } to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(8px); } }

    /* ─── HERO FOOTER WAVE ─── */
    .hero-wave {
      display: block;
      width: 100%;
      overflow: hidden;
      line-height: 0;
      margin-bottom: -2px;
    }

    /* ─── CHAT FAB ─── */
    #chat-fab {
      position: fixed;
      bottom: 28px;
      right: 24px;
      width: 64px;
      height: 64px;
      border-radius: 22px;
      background: linear-gradient(145deg, var(--green-lt), var(--green-dk));
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 4px 0 rgba(0,0,0,0.18),
        0 8px 28px rgba(61,122,82,0.45);
      transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s ease;
      z-index: 900;
      overflow: hidden;
    }

    #chat-fab::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 45%;
      background: linear-gradient(180deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0) 100%);
      border-radius: 22px 22px 0 0;
      pointer-events: none;
    }

    #chat-fab:hover {
      transform: translateY(-5px) scale(1.06);
      box-shadow: 0 8px 0 rgba(0,0,0,0.14), 0 16px 36px rgba(61,122,82,0.5);
    }

    #chat-fab:active {
      transform: scale(0.92);
      box-shadow: 0 1px 0 rgba(0,0,0,0.12), 0 4px 12px rgba(61,122,82,0.3);
    }

    #chat-fab svg {
      width: 28px;
      height: 28px;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
    }

    /* Notification dot */
    .fab-dot {
      position: absolute;
      top: 9px;
      right: 9px;
      width: 10px;
      height: 10px;
      background: var(--amber);
      border-radius: 50%;
      border: 2px solid white;
      animation: pulse 2s ease-in-out infinite;
    }

    /* ─── CHAT PANEL ─── */
    #chat-panel {
      position: fixed;
      inset: 0;
      z-index: 950;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    #chat-panel.open {
      pointer-events: auto;
      opacity: 1;
    }

    .chat-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(10,26,18,0.45);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
    }

    .chat-sheet {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
      max-height: 82vh;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(40px);
      border-radius: 28px 28px 0 0;
      display: flex;
      flex-direction: column;
      box-shadow: 0 -8px 48px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.06);
      transform: translateY(100%);
      transition: transform 0.38s cubic-bezier(.32,1.2,.64,1);
      overflow: hidden;
    }

    #chat-panel.open .chat-sheet {
      transform: translateY(0);
    }

    .chat-header {
      padding: 20px 24px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1.5px solid var(--gray-2);
      flex-shrink: 0;
    }

    .chat-header-icon {
      width: 42px;
      height: 42px;
      border-radius: 13px;
      background: linear-gradient(145deg, var(--green-lt), var(--green-dk));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 0 rgba(0,0,0,0.14), 0 6px 16px rgba(61,122,82,0.35);
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
    }

    .chat-header-icon::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 45%;
      background: linear-gradient(180deg, rgba(255,255,255,0.22) 0%, transparent 100%);
      border-radius: 13px 13px 0 0;
    }

    .chat-header-icon svg {
      width: 20px;
      height: 20px;
    }

    .chat-header-text { flex: 1; }

    .chat-header-text h3 {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .chat-live-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(245,166,35,0.15);
      border: 1px solid rgba(245,166,35,0.3);
      border-radius: 100px;
      padding: 2px 9px;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--amber-dk);
      margin-top: 3px;
    }

    .chat-live-dot {
      width: 5px; height: 5px;
      background: var(--amber);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    .chat-close {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--gray-1);
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--gray-4);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.15s;
      font-weight: 700;
    }

    .chat-close:hover { background: var(--gray-2); transform: scale(1.1); }

    .chat-feed {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-feed:empty::after {
      content: 'Še ni sporočil. Dodaj prvo! 👇';
      color: var(--gray-3);
      font-size: 0.88rem;
      font-weight: 600;
      text-align: center;
      padding: 32px 0;
    }

    .feed-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--gray-1);
      border-radius: var(--radius-md);
      border: 1.5px solid transparent;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s, transform 0.15s cubic-bezier(.34,1.56,.64,1), box-shadow 0.15s;
      animation: popIn 0.4s cubic-bezier(.34,1.56,.64,1) both;
      position: relative;
    }

    .feed-item:hover {
      border-color: rgba(61,122,82,0.25);
      background: var(--green-bg);
      transform: translateX(4px);
      box-shadow: var(--shadow-sm);
    }

    .feed-item-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    .feed-item-text { flex: 1; min-width: 0; }

    .feed-link-label {
      font-size: 0.82rem;
      font-weight: 800;
      color: var(--green);
      font-family: 'Plus Jakarta Sans', monospace;
      letter-spacing: -0.2px;
    }

    .feed-separator {
      color: var(--gray-3);
      margin: 0 4px;
      font-weight: 500;
    }

    .feed-desc {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
    }

    .feed-item-arrow {
      color: var(--gray-3);
      font-size: 0.8rem;
      flex-shrink: 0;
      transition: color 0.15s, transform 0.15s;
    }

    .feed-item:hover .feed-item-arrow {
      color: var(--green);
      transform: translateX(3px);
    }

    .feed-delete-btn {
      position: absolute;
      top: 8px; right: 8px;
      width: 20px; height: 20px;
      background: #ff3b30;
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
      box-shadow: 0 2px 6px rgba(255,59,48,0.35);
    }

    .chat-feed.editing .feed-delete-btn { display: flex; }
    .chat-feed.editing .feed-item { padding-right: 34px; }

    .chat-footer {
      padding: 14px 24px 20px;
      border-top: 1.5px solid var(--gray-2);
      flex-shrink: 0;
      display: flex;
      gap: 8px;
    }

    .chat-input-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .chat-input {
      width: 100%;
      padding: 11px 14px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--gray-2);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      background: var(--gray-1);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .chat-input:focus {
      border-color: var(--green);
      background: white;
      box-shadow: 0 0 0 3px rgba(61,122,82,0.1);
    }

    .chat-send-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      background: var(--green);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      align-self: flex-end;
      box-shadow: 0 4px 14px rgba(61,122,82,0.35);
      transition: transform 0.15s cubic-bezier(.34,1.56,.64,1), box-shadow 0.15s;
      flex-shrink: 0;
    }

    .chat-send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 18px rgba(61,122,82,0.45); }
    .chat-send-btn:active { transform: scale(0.92); }

    .chat-edit-toggle {
      font-size: 0.72rem;
      color: var(--gray-3);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .chat-edit-toggle:hover { color: var(--gray-4); background: var(--gray-1); }
    .chat-edit-toggle.active { color: var(--green); }
  </style>
</head>
<body>

<!-- HERO -->
<header class="hero">
  <div class="hero-inner">
    <div class="hero-logo-wrap">
      <img src="Brihta.png" alt="Brihta maskota">
    </div>
    <div class="hero-text">
      <div class="hero-badge">
        <span class="hero-badge-dot"></span>
        Učni portal
      </div>
      <div class="hero-title">Brihta<span>.</span></div>
      <div class="hero-sub">Osnovna šola · Predmeti &amp; orodja</div>
    </div>
  </div>
</header>
<svg class="hero-wave" viewBox="0 0 1440 36" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <path d="M0,36 C360,0 1080,0 1440,36 L1440,36 L0,36 Z" fill="#ffffff"/>
</svg>

<main>

  <!-- PREDMETI -->
  <section>
    <div class="section-header">
      <span class="section-title">Predmeti</span>
    </div>
    <div class="app-grid" id="subjects-grid"></div>
  </section>

  <div class="divider"></div>

  <!-- ORODJA -->
  <section>
    <div class="section-header">
      <span class="section-title">Učiteljeva orodja</span>
    </div>
    <div class="app-grid" id="tools-grid"></div>
  </section>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <button class="btn btn-primary" id="add-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="white" stroke-width="2.2" stroke-linecap="round"/></svg>
      Dodaj stran
    </button>
    <button class="btn btn-ghost" id="edit-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9.5 1.5l3 3L4 13H1v-3L9.5 1.5z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
      Uredi
    </button>
  </div>
  <p class="note">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="#aeaeb2" stroke-width="1.2"/><path d="M6 5.5v3M6 4h.01" stroke="#aeaeb2" stroke-width="1.2" stroke-linecap="round"/></svg>
    Dodane strani se shranijo lokalno na tej napravi.
  </p>

</main>

<div id="modal-container"></div>
<div id="toast-container"></div>

<!-- CHAT FAB -->
<button id="chat-fab" title="Aktualne povezave" aria-label="Odpri feed">
  <div class="fab-dot"></div>
  <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M4 6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H9.5L4 24V6z" fill="rgba(255,255,255,0.95)" stroke="rgba(255,255,255,0.5)" stroke-width="0.5"/>
    <path d="M9 11h10M9 15h6" stroke="rgba(61,122,82,0.8)" stroke-width="2" stroke-linecap="round"/>
  </svg>
</button>

<!-- CHAT PANEL -->
<div id="chat-panel" role="dialog" aria-modal="true" aria-label="Aktualne povezave">
  <div class="chat-backdrop" id="chat-backdrop"></div>
  <div class="chat-sheet">
    <div class="chat-header">
      <div class="chat-header-icon">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 4a1.5 1.5 0 0 1 1.5-1.5h11A1.5 1.5 0 0 1 17 4v9a1.5 1.5 0 0 1-1.5 1.5H7L3 17.5V4z" fill="rgba(255,255,255,0.95)"/>
          <path d="M6.5 8h7M6.5 11h4.5" stroke="rgba(61,122,82,0.8)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="chat-header-text">
        <h3>Aktualne povezave</h3>
        <div class="chat-live-badge"><span class="chat-live-dot"></span>V živo</div>
      </div>
      <button class="chat-edit-toggle" id="chat-edit-toggle">Uredi</button>
      <button class="chat-close" id="chat-close" aria-label="Zapri">&#x2715;</button>
    </div>
    <div class="chat-feed" id="chat-feed"></div>
    <div class="chat-footer">
      <div class="chat-input-wrap">
        <input class="chat-input" id="chat-url" type="url" placeholder="https://..." autocomplete="off">
        <input class="chat-input" id="chat-desc" type="text" placeholder="Opis (npr. Froggy gets dressed)" autocomplete="off">
      </div>
      <button class="chat-send-btn" id="chat-send" title="Dodaj">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 9h14M9 2l7 7-7 7" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = "brihta_custom_links";

  const subjects = [
    { id:"s_mat", name:"Matematika",  url:"https://brihta.github.io/matematika/",  icon:"🔢", color:"#ff3b30" },
    { id:"s_drz", name:"Družba",      url:"https://brihta.github.io/druzba/",      icon:"🌍", color:"#34c759" },
    { id:"s_ang", name:"Angleščina",  url:"https://brihta.github.io/anglescina/",  icon:"🇬🇧", color:"#007aff" },
  ];

  const builtinTools = [
    { id:"t_bing", name:"Bingo",             url:"https://nicki89-blip.github.io/bingo/", icon:"🎲", color:"#af52de" },
    { id:"t_clnp", name:"Pospravimo razred", url:"https://larakin.my.canva.site/cleanup", icon:"🧹", color:"#ff9500" },
  ];

  let deleteMode = false;

  function loadCustom() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; }
  }
  function saveCustom(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }
  function isFixed(id) { return id.startsWith('s_') || id.startsWith('t_'); }

  function renderGrid(containerId, items) {
    const grid = document.getElementById(containerId);
    grid.classList.toggle('delete-mode', deleteMode);
    grid.innerHTML = "";
    items.forEach(item => {
      const div = document.createElement("div");
      div.className = "app-icon";
      const canDelete = !isFixed(item.id);
      div.innerHTML = `
        <div class="app-icon-box" style="background:${item.color};">
          ${item.icon}
          ${canDelete ? `<button class="delete-badge" data-id="${item.id}" title="Izbriši">×</button>` : ''}
        </div>
        <span class="app-icon-label">${item.name}</span>
      `;
      div.querySelector('.app-icon-box').addEventListener('click', e => {
        if (e.target.classList.contains('delete-badge')) return;
        if (deleteMode) return;
        window.open(item.url, '_blank', 'noopener,noreferrer');
      });
      const badge = div.querySelector('.delete-badge');
      if (badge) badge.addEventListener('click', e => { e.stopPropagation(); showDeleteConfirm(item); });
      grid.appendChild(div);
    });
  }

  function render() {
    renderGrid('subjects-grid', subjects);
    renderGrid('tools-grid', [...builtinTools, ...loadCustom()]);
    const editBtn = document.getElementById('edit-btn');
    editBtn.innerHTML = deleteMode
      ? `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l4 4 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg> Končano`
      : `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9.5 1.5l3 3L4 13H1v-3L9.5 1.5z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg> Uredi`;
  }

  document.getElementById('edit-btn').addEventListener('click', () => { deleteMode = !deleteMode; render(); });

  document.getElementById('add-btn').addEventListener('click', () => {
    const modal = document.getElementById('modal-container');
    modal.innerHTML = `
      <div class="modal-backdrop">
        <div class="modal-box">
          <h2>Dodaj stran</h2>
          <div class="modal-field"><label>Ime strani</label><input id="m-name" type="text" placeholder="npr. Kviz iz narave"></div>
          <div class="modal-field"><label>URL naslov</label><input id="m-url" type="url" placeholder="https://..."></div>
          <div class="modal-field"><label>Emoji ikona</label><input id="m-icon" type="text" placeholder="🌐" maxlength="4" value="🌐"></div>
          <div class="modal-btns">
            <button class="btn btn-primary" id="m-save" style="flex:1">Shrani</button>
            <button class="btn btn-ghost" id="m-cancel">Prekliči</button>
          </div>
        </div>
      </div>`;
    modal.querySelector('.modal-backdrop').addEventListener('click', e => { if (e.target === e.currentTarget) modal.innerHTML = ''; });
    document.getElementById('m-cancel').onclick = () => modal.innerHTML = '';
    document.getElementById('m-save').onclick = () => {
      const name = document.getElementById('m-name').value.trim();
      let url   = document.getElementById('m-url').value.trim();
      const icon = document.getElementById('m-icon').value.trim() || '🌐';
      if (!name || !url) { showToast('⚠️ Izpolni vsa polja!'); return; }
      if (!url.startsWith('http')) url = 'https://' + url;
      const custom = loadCustom();
      const palette = ['#00c7be','#5e5ce6','#32d74b','#ff375f','#ffd60a','#0a84ff'];
      custom.push({ id: 'c_' + Date.now(), name, url, icon, color: palette[custom.length % palette.length] });
      saveCustom(custom);
      modal.innerHTML = '';
      render();
      showToast('Stran dodana! 🎉');
    };
  });

  function showDeleteConfirm(item) {
    const modal = document.getElementById('modal-container');
    modal.innerHTML = `
      <div class="modal-backdrop">
        <div class="modal-box">
          <h2>Izbriši stran?</h2>
          <p class="modal-desc">Odstranim <strong>${item.name}</strong> iz portala? Tega ne moreš razveljaviti.</p>
          <div class="modal-btns">
            <button class="btn btn-primary" id="c-yes" style="background:#ff3b30;box-shadow:0 4px 14px rgba(255,59,48,0.3);flex:1">Izbriši</button>
            <button class="btn btn-ghost" id="c-no">Prekliči</button>
          </div>
        </div>
      </div>`;
    document.getElementById('c-yes').onclick = () => {
      const custom = loadCustom().filter(w => w.id !== item.id);
      saveCustom(custom);
      modal.innerHTML = '';
      if (custom.length === 0) deleteMode = false;
      render();
      showToast('Stran izbrisana.');
    };
    document.getElementById('c-no').onclick = () => modal.innerHTML = '';
  }

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(() => t.remove(), 2800);
  }

  render();

  // ─── CHAT FEED — Firebase Realtime Database (shared across all devices) ───
  //
  // ⚙️  SETUP (one-time, 2 minutes):
  //   1. Go to https://console.firebase.google.com  →  "Add project"  (free Spark plan)
  //   2. In your project: Build → Realtime Database → Create database → Start in TEST mode
  //   3. Copy your database URL (looks like: https://YOUR-PROJECT-default-rtdb.firebaseio.com)
  //   4. Paste it below replacing the placeholder:
  //
  const FIREBASE_URL = "https://brihta-455eb-default-rtdb.firebaseio.com";
  //
  // That's it — the chat will instantly sync across every device!
  // ─────────────────────────────────────────────────────────────────────────

  const DB = `${FIREBASE_URL}/brihta_feed`;
  let chatEditing = false;
  let liveItems = [];   // kept in memory, updated by SSE stream
  let sseSource = null;

  function shortenUrl(url) {
    return url.length <= 12 ? url : url.substring(0, 12);
  }

  // ── Render the in-memory list ──
  function renderFeed() {
    const feed = document.getElementById('chat-feed');
    feed.classList.toggle('editing', chatEditing);
    feed.innerHTML = '';
    if (!liveItems.length) return;
    // Show newest first
    [...liveItems].reverse().forEach(item => {
      const a = document.createElement('a');
      a.className = 'feed-item';
      a.href = item.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.innerHTML = `
        <div class="feed-item-dot"></div>
        <div class="feed-item-text">
          <span class="feed-link-label">${shortenUrl(item.url)}</span><span class="feed-separator"> — </span><span class="feed-desc">${escHtml(item.desc)}</span>
        </div>
        <span class="feed-item-arrow">&#8250;</span>
        <button class="feed-delete-btn" data-key="${item._key}" title="Izbri&#353;">&#xD7;</button>
      `;
      a.querySelector('.feed-delete-btn').addEventListener('click', async e => {
        e.preventDefault(); e.stopPropagation();
        await deleteItem(item._key);
      });
      feed.appendChild(a);
    });
    // Update FAB dot
    const dot = document.querySelector('.fab-dot');
    if (dot) dot.style.display = liveItems.length ? '' : 'none';
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Firebase REST helpers ──
  async function addItem(url, desc) {
    const res = await fetch(`${DB}.json`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, desc, ts: Date.now() })
    });
    return res.ok;
  }

  async function deleteItem(key) {
    await fetch(`${DB}/${key}.json`, { method: 'DELETE' });
  }

  // ── Server-Sent Events: real-time listener ──
  function startLiveSync() {
    if (!FIREBASE_URL || FIREBASE_URL.includes('YOUR-PROJECT')) {
      // Firebase not configured yet — show setup notice in feed
      const feed = document.getElementById('chat-feed');
      feed.innerHTML = `<div style="padding:20px 8px;text-align:center;color:var(--gray-3);font-size:0.82rem;font-weight:600;line-height:1.6">
        &#9881; <strong style="color:var(--gray-4)">Firebase ni nastavljen.</strong><br>
        Odpri index.html in nastavi<br><code style="background:var(--gray-2);padding:2px 6px;border-radius:6px;font-size:0.78rem">FIREBASE_URL</code> v kodi.
      </div>`;
      return;
    }

    if (sseSource) sseSource.close();

    sseSource = new EventSource(`${DB}.json?accept=text/event-stream`);

    sseSource.addEventListener('put', e => {
      try {
        const data = JSON.parse(e.data);
        if (data.path === '/') {
          // Full snapshot
          liveItems = data.data
            ? Object.entries(data.data).map(([k, v]) => ({ _key: k, ...v })).sort((a,b) => a.ts - b.ts)
            : [];
        } else {
          // Single item added or removed
          const key = data.path.replace('/', '');
          if (data.data === null) {
            liveItems = liveItems.filter(i => i._key !== key);
          } else {
            const exists = liveItems.find(i => i._key === key);
            if (!exists) liveItems.push({ _key: key, ...data.data });
          }
        }
        renderFeed();
      } catch(err) { /* ignore parse errors */ }
    });

    sseSource.addEventListener('patch', e => {
      // Refresh fully on patch
      fetchOnce();
    });

    sseSource.onerror = () => {
      // On disconnect, retry after 3s
      sseSource.close();
      setTimeout(startLiveSync, 3000);
    };
  }

  async function fetchOnce() {
    try {
      const res = await fetch(`${DB}.json`);
      const data = await res.json();
      liveItems = data
        ? Object.entries(data).map(([k, v]) => ({ _key: k, ...v })).sort((a,b) => a.ts - b.ts)
        : [];
      renderFeed();
    } catch(e) {}
  }

  // ── Panel open/close ──
  function openChat() {
    const panel = document.getElementById('chat-panel');
    panel.classList.add('open');
    document.getElementById('chat-url').focus();
    startLiveSync();
  }

  function closeChat() {
    document.getElementById('chat-panel').classList.remove('open');
    chatEditing = false;
    document.getElementById('chat-edit-toggle').classList.remove('active');
    document.getElementById('chat-edit-toggle').textContent = 'Uredi';
    if (sseSource) { sseSource.close(); sseSource = null; }
    renderFeed();
  }

  document.getElementById('chat-fab').addEventListener('click', openChat);
  document.getElementById('chat-close').addEventListener('click', closeChat);
  document.getElementById('chat-backdrop').addEventListener('click', closeChat);

  document.getElementById('chat-edit-toggle').addEventListener('click', () => {
    chatEditing = !chatEditing;
    const btn = document.getElementById('chat-edit-toggle');
    btn.classList.toggle('active', chatEditing);
    btn.textContent = chatEditing ? 'Kon&#269;ano' : 'Uredi';
    renderFeed();
  });

  document.getElementById('chat-send').addEventListener('click', async () => {
    let url = document.getElementById('chat-url').value.trim();
    const desc = document.getElementById('chat-desc').value.trim();
    if (!url || !desc) { showToast('&#9888;&#65039; Izpolni oba polji!'); return; }
    if (!url.startsWith('http')) url = 'https://' + url;
    const btn = document.getElementById('chat-send');
    btn.disabled = true;
    const ok = await addItem(url, desc);
    btn.disabled = false;
    if (ok) {
      document.getElementById('chat-url').value = '';
      document.getElementById('chat-desc').value = '';
      showToast('Povezava dodana! &#128279;');
    } else {
      showToast('&#10060; Napaka — preveri Firebase URL.');
    }
  });

  document.getElementById('chat-desc').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('chat-send').click();
  });

  // Init FAB dot: hide if Firebase not yet configured
  (function() {
    const dot = document.querySelector('.fab-dot');
    if (dot && FIREBASE_URL.includes('YOUR-PROJECT')) dot.style.display = 'none';
    else if (dot) dot.style.display = '';
  })();
</script>
</body>
</html>
