<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brihta — Učni portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:     #3d7a52;
      --green-lt:  #4e9966;
      --green-dk:  #1a3a2a;
      --green-bg:  #f0f7f3;
      --amber:     #f5a623;
      --amber-dk:  #e8902a;
      --white:     #ffffff;
      --gray-1:    #f5f5f7;
      --gray-2:    #e8e8ed;
      --gray-3:    #aeaeb2;
      --gray-4:    #636366;
      --text:      #1d1d1f;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.10);
      --shadow-lg: 0 20px 48px rgba(0,0,0,0.14);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --max-w: 720px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      background: var(--white);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HERO HEADER ─── */
    .hero {
      background: linear-gradient(160deg, #1a3a2a 0%, #2d5a3d 45%, #3d7a52 100%);
      padding: 0 24px 0;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 70% 50%, rgba(245,166,35,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 50% 80% at 10% 100%, rgba(61,122,82,0.3) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Subtle dot grid */
    .hero::after {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    .hero-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 1;
    }

    .hero-logo-wrap {
      flex-shrink: 0;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      position: relative;
    }

    .hero-logo-wrap img {
      width: 200px;
      height: 200px;
      object-fit: contain;
      object-position: bottom center;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.3));
      animation: heroOwlIn 0.7s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes heroOwlIn {
      from { opacity: 0; transform: translateY(20px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .hero-text {
      flex: 1;
      padding: 36px 0 36px 28px;
      animation: heroTextIn 0.6s ease both 0.15s;
    }

    @keyframes heroTextIn {
      from { opacity: 0; transform: translateX(16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(245,166,35,0.18);
      border: 1px solid rgba(245,166,35,0.35);
      border-radius: 100px;
      padding: 4px 12px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 12px;
    }

    .hero-badge-dot {
      width: 6px; height: 6px;
      background: var(--amber);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.7); }
    }

    .hero-title {
      font-size: clamp(2.6rem, 6vw, 3.8rem);
      font-weight: 900;
      color: #fff;
      line-height: 1;
      letter-spacing: -1.5px;
    }

    .hero-title span {
      background: linear-gradient(90deg, #f5a623, #ffd080);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      margin-top: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.2px;
    }

    /* ─── MAIN ─── */
    main {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* ─── SECTION HEADERS ─── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--gray-3);
    }

    /* ─── APP GRID ─── */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 44px;
    }

    @media (max-width: 480px) {
      .app-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
    }

    /* ─── APP ICON ─── */
    .app-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      position: relative;
      animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
    }

    .app-icon:nth-child(1) { animation-delay: 0.05s; }
    .app-icon:nth-child(2) { animation-delay: 0.10s; }
    .app-icon:nth-child(3) { animation-delay: 0.15s; }
    .app-icon:nth-child(4) { animation-delay: 0.20s; }
    .app-icon:nth-child(5) { animation-delay: 0.25s; }
    .app-icon:nth-child(6) { animation-delay: 0.30s; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.75) translateY(12px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .app-icon-box {
      width: 76px;
      height: 76px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.1rem;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 4px 0 rgba(0,0,0,0.12),
        0 6px 18px rgba(0,0,0,0.12);
      transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s ease;
    }

    /* Gloss shine */
    .app-icon-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 45%;
      background: linear-gradient(180deg, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0) 100%);
      border-radius: 22px 22px 0 0;
      pointer-events: none;
    }

    .app-icon:hover .app-icon-box {
      transform: translateY(-5px) scale(1.06);
      box-shadow: 0 8px 0 rgba(0,0,0,0.10), 0 14px 32px rgba(0,0,0,0.16);
    }

    .app-icon:active .app-icon-box {
      transform: scale(0.92) translateY(0);
      box-shadow: 0 1px 0 rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.10);
    }

    .app-icon-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      line-height: 1.25;
      max-width: 80px;
    }

    /* ─── DELETE MODE ─── */
    .delete-badge {
      position: absolute;
      top: -7px; left: -7px;
      width: 24px; height: 24px;
      background: #ff3b30;
      border-radius: 50%;
      color: white;
      font-size: 16px;
      font-weight: 700;
      border: 2px solid white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 5;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      line-height: 1;
    }

    .delete-mode .delete-badge { opacity: 1; pointer-events: auto; }
    .delete-mode .app-icon-box { animation: jiggle 0.35s ease-in-out infinite; }

    @keyframes jiggle {
      0%, 100% { transform: rotate(-2.5deg); }
      50%       { transform: rotate(2.5deg); }
    }

    /* ─── TOOLBAR ─── */
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 22px;
      border-radius: 100px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      border: none;
      cursor: pointer;
      transition: transform 0.15s cubic-bezier(.34,1.56,.64,1), box-shadow 0.15s ease, opacity 0.15s;
      letter-spacing: 0.1px;
    }

    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: scale(0.95); }

    .btn-primary {
      background: var(--green);
      color: #fff;
      box-shadow: 0 4px 14px rgba(61,122,82,0.35);
    }
    .btn-primary:hover { box-shadow: 0 8px 24px rgba(61,122,82,0.4); }

    .btn-ghost {
      background: var(--gray-1);
      color: var(--gray-4);
      box-shadow: var(--shadow-sm);
    }
    .btn-ghost:hover { background: var(--gray-2); }

    .note {
      font-size: 0.73rem;
      color: var(--gray-3);
      margin-top: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ─── DIVIDER ─── */
    .divider {
      height: 1px;
      background: var(--gray-2);
      margin: 36px 0;
    }

    /* ─── MODAL ─── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-box {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: var(--radius-xl);
      padding: 32px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.06);
      animation: slideUp 0.3s cubic-bezier(.34,1.4,.64,1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-box h2 {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }

    .modal-field { margin-bottom: 14px; }

    .modal-field label {
      display: block;
      font-weight: 700;
      font-size: 0.72rem;
      color: var(--gray-3);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .modal-field input {
      width: 100%;
      padding: 13px 16px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--gray-2);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      background: var(--gray-1);
      outline: none;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }

    .modal-field input:focus {
      border-color: var(--green);
      background: white;
      box-shadow: 0 0 0 4px rgba(61,122,82,0.1);
    }

    .modal-btns {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .modal-desc {
      font-size: 0.9rem;
      color: var(--gray-4);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* ─── TOAST ─── */
    #toast-container {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      pointer-events: none;
    }

    .toast {
      background: var(--green-dk);
      color: white;
      padding: 13px 22px;
      border-radius: 100px;
      font-weight: 700;
      font-size: 0.88rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      animation: toastIn 0.35s cubic-bezier(.34,1.56,.64,1) both,
                 toastOut 0.3s ease 2.5s both;
      white-space: nowrap;
    }

    @keyframes toastIn  { from { opacity:0; transform: translateY(16px) scale(0.9); } to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(8px); } }

    /* ─── HERO FOOTER WAVE ─── */
    .hero-wave {
      display: block;
      width: 100%;
      overflow: hidden;
      line-height: 0;
      margin-bottom: -2px;
    }
  </style>
</head>
<body>

<!-- HERO -->
<header class="hero">
  <div class="hero-inner">
    <div class="hero-logo-wrap">
      <img src="Brihta.png" alt="Brihta maskota">
    </div>
    <div class="hero-text">
      <div class="hero-badge">
        <span class="hero-badge-dot"></span>
        Učni portal
      </div>
      <div class="hero-title">Brihta<span>.</span></div>
      <div class="hero-sub">Osnovna šola · Predmeti &amp; orodja</div>
    </div>
  </div>
</header>
<svg class="hero-wave" viewBox="0 0 1440 36" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <path d="M0,36 C360,0 1080,0 1440,36 L1440,36 L0,36 Z" fill="#ffffff"/>
</svg>

<main>

  <!-- PREDMETI -->
  <section>
    <div class="section-header">
      <span class="section-title">Predmeti</span>
    </div>
    <div class="app-grid" id="subjects-grid"></div>
  </section>

  <div class="divider"></div>

  <!-- ORODJA -->
  <section>
    <div class="section-header">
      <span class="section-title">Učiteljeva orodja</span>
    </div>
    <div class="app-grid" id="tools-grid"></div>
  </section>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <button class="btn btn-primary" id="add-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="white" stroke-width="2.2" stroke-linecap="round"/></svg>
      Dodaj stran
    </button>
    <button class="btn btn-ghost" id="edit-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9.5 1.5l3 3L4 13H1v-3L9.5 1.5z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
      Uredi
    </button>
  </div>
  <p class="note">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="#aeaeb2" stroke-width="1.2"/><path d="M6 5.5v3M6 4h.01" stroke="#aeaeb2" stroke-width="1.2" stroke-linecap="round"/></svg>
    Dodane strani se shranijo lokalno na tej napravi.
  </p>

</main>

<div id="modal-container"></div>
<div id="toast-container"></div>

<script>
  const STORAGE_KEY = "brihta_custom_links";

  const subjects = [
    { id:"s_mat", name:"Matematika",  url:"https://brihta.github.io/matematika/",  icon:"🔢", color:"#ff3b30" },
    { id:"s_drz", name:"Družba",      url:"https://brihta.github.io/druzba/",      icon:"🌍", color:"#34c759" },
    { id:"s_ang", name:"Angleščina",  url:"https://brihta.github.io/anglescina/",  icon:"🇬🇧", color:"#007aff" },
  ];

  const builtinTools = [
    { id:"t_bing", name:"Bingo",             url:"https://nicki89-blip.github.io/bingo/", icon:"🎲", color:"#af52de" },
    { id:"t_clnp", name:"Pospravimo razred", url:"https://larakin.my.canva.site/cleanup", icon:"🧹", color:"#ff9500" },
  ];

  let deleteMode = false;

  function loadCustom() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; }
  }
  function saveCustom(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }
  function isFixed(id) { return id.startsWith('s_') || id.startsWith('t_'); }

  function renderGrid(containerId, items) {
    const grid = document.getElementById(containerId);
    grid.classList.toggle('delete-mode', deleteMode);
    grid.innerHTML = "";
    items.forEach(item => {
      const div = document.createElement("div");
      div.className = "app-icon";
      const canDelete = !isFixed(item.id);
      div.innerHTML = `
        <div class="app-icon-box" style="background:${item.color};">
          ${item.icon}
          ${canDelete ? `<button class="delete-badge" data-id="${item.id}" title="Izbriši">×</button>` : ''}
        </div>
        <span class="app-icon-label">${item.name}</span>
      `;
      div.querySelector('.app-icon-box').addEventListener('click', e => {
        if (e.target.classList.contains('delete-badge')) return;
        if (deleteMode) return;
        window.open(item.url, '_blank', 'noopener,noreferrer');
      });
      const badge = div.querySelector('.delete-badge');
      if (badge) badge.addEventListener('click', e => { e.stopPropagation(); showDeleteConfirm(item); });
      grid.appendChild(div);
    });
  }

  function render() {
    renderGrid('subjects-grid', subjects);
    renderGrid('tools-grid', [...builtinTools, ...loadCustom()]);
    const editBtn = document.getElementById('edit-btn');
    editBtn.innerHTML = deleteMode
      ? `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l4 4 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg> Končano`
      : `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9.5 1.5l3 3L4 13H1v-3L9.5 1.5z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg> Uredi`;
  }

  document.getElementById('edit-btn').addEventListener('click', () => { deleteMode = !deleteMode; render(); });

  document.getElementById('add-btn').addEventListener('click', () => {
    const modal = document.getElementById('modal-container');
    modal.innerHTML = `
      <div class="modal-backdrop">
        <div class="modal-box">
          <h2>Dodaj stran</h2>
          <div class="modal-field"><label>Ime strani</label><input id="m-name" type="text" placeholder="npr. Kviz iz narave"></div>
          <div class="modal-field"><label>URL naslov</label><input id="m-url" type="url" placeholder="https://..."></div>
          <div class="modal-field"><label>Emoji ikona</label><input id="m-icon" type="text" placeholder="🌐" maxlength="4" value="🌐"></div>
          <div class="modal-btns">
            <button class="btn btn-primary" id="m-save" style="flex:1">Shrani</button>
            <button class="btn btn-ghost" id="m-cancel">Prekliči</button>
          </div>
        </div>
      </div>`;
    modal.querySelector('.modal-backdrop').addEventListener('click', e => { if (e.target === e.currentTarget) modal.innerHTML = ''; });
    document.getElementById('m-cancel').onclick = () => modal.innerHTML = '';
    document.getElementById('m-save').onclick = () => {
      const name = document.getElementById('m-name').value.trim();
      let url   = document.getElementById('m-url').value.trim();
      const icon = document.getElementById('m-icon').value.trim() || '🌐';
      if (!name || !url) { showToast('⚠️ Izpolni vsa polja!'); return; }
      if (!url.startsWith('http')) url = 'https://' + url;
      const custom = loadCustom();
      const palette = ['#00c7be','#5e5ce6','#32d74b','#ff375f','#ffd60a','#0a84ff'];
      custom.push({ id: 'c_' + Date.now(), name, url, icon, color: palette[custom.length % palette.length] });
      saveCustom(custom);
      modal.innerHTML = '';
      render();
      showToast('Stran dodana! 🎉');
    };
  });

  function showDeleteConfirm(item) {
    const modal = document.getElementById('modal-container');
    modal.innerHTML = `
      <div class="modal-backdrop">
        <div class="modal-box">
          <h2>Izbriši stran?</h2>
          <p class="modal-desc">Odstranim <strong>${item.name}</strong> iz portala? Tega ne moreš razveljaviti.</p>
          <div class="modal-btns">
            <button class="btn btn-primary" id="c-yes" style="background:#ff3b30;box-shadow:0 4px 14px rgba(255,59,48,0.3);flex:1">Izbriši</button>
            <button class="btn btn-ghost" id="c-no">Prekliči</button>
          </div>
        </div>
      </div>`;
    document.getElementById('c-yes').onclick = () => {
      const custom = loadCustom().filter(w => w.id !== item.id);
      saveCustom(custom);
      modal.innerHTML = '';
      if (custom.length === 0) deleteMode = false;
      render();
      showToast('Stran izbrisana.');
    };
    document.getElementById('c-no').onclick = () => modal.innerHTML = '';
  }

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(() => t.remove(), 2800);
  }

  render();
</script>
</body>
</html>
